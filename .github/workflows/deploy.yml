name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT }}/intersection-twin \
            --suppress-logs

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy intersection-twin \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/intersection-twin \
            --platform managed \
            --region us-east1 \
            --set-env-vars GCS_BUCKET=vehicle-camera-frames,KAFKA_BOOTSTRAP=pkc-619z3.us-east1.gcp.confluent.cloud:9092,KAFKA_API_KEY=${{ secrets.KAFKA_API_KEY }},KAFKA_API_SECRET=${{ secrets.KAFKA_API_SECRET }},NEO4J_URI=${{ secrets.NEO4J_URI }},NEO4J_USER=${{ secrets.NEO4J_USER }},NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }} \
            --memory 4Gi \
            --cpu 2 \
            --timeout 300 \
            --allow-unauthenticated
